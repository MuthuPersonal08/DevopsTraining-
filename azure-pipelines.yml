trigger:
  - main

pool:
  name: Default

steps:

# Cleanup previous Docker resources
- script: |
    echo "Stopping and removing old containers..."
    docker compose -f $(Build.SourcesDirectory)/docker-compose.yml down --rmi all --volumes --remove-orphans || true

    echo "Removing old Playwright image..."
    docker rmi -f playwright-tests || true

    echo "Cleaning Docker..."
    docker system prune -af --volumes || true

    echo "Cleaning old reports..."
    rm -rf $(Build.SourcesDirectory)/playwright-report
    rm -rf $(Build.SourcesDirectory)/test-results

    mkdir -p $(Build.SourcesDirectory)/playwright-report
    mkdir -p $(Build.SourcesDirectory)/test-results
  displayName: "Cleanup"


# Start Playwright container
- script: |
    echo "Starting Playwright container..."
    docker compose -f $(Build.SourcesDirectory)/docker-compose.yml up -d
  displayName: "Run Playwright Container"

# Wait until Playwright container finishes
- script: |
    docker wait playwright-container
  displayName: "Wait for Tests"
  condition: always()

# Show container logs
- script: |
    docker logs playwright-container
  displayName: "Container Logs"
  condition: always()

# Publish Playwright HTML Report
- task: PublishPipelineArtifact@1
  displayName: "Publish Playwright Report"
  condition: always()
  inputs:
    targetPath: "$(Build.SourcesDirectory)/playwright-report"
    artifact: "PlaywrightReport"

# Publish Test Results
- task: PublishPipelineArtifact@1
  displayName: "Publish Test Results"
  condition: always()
  inputs:
    targetPath: "$(Build.SourcesDirectory)/test-results"
    artifact: "TestResults"

# Final cleanup
- script: |
    docker compose -f $(Build.SourcesDirectory)/docker-compose.yml down --rmi all --volumes --remove-orphans || true
    docker system prune -af --volumes || true
  displayName: "Final Cleanup"
  condition: always()