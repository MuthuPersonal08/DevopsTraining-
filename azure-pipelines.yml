trigger: none

pool:
  name: Remote

steps:
- powershell: |
    Write-Host "========== Azure DevOps Agent Validation =========="

    Write-Host ""
    Write-Host "Computer Name:"
    hostname

    Write-Host ""
    Write-Host "Current User:"
    whoami

    Write-Host ""
    Write-Host "Current Date:"
    Get-Date

    Write-Host ""
    Write-Host "Current Directory:"
    Get-Location

    Write-Host ""
    Write-Host "Checking Windows Event Log Service..."
    Get-Service EventLog

    Write-Host ""
    Write-Host "Checking Print Spooler Service..."
    Get-Service Spooler

    Write-Host ""
    Write-Host "Checking Windows Management Service..."
    Get-Service Winmgmt

    Write-Host ""
    Write-Host "Validation completed successfully."
  displayName: "Validate Self-Hosted Agent"