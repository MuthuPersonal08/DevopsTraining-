trigger:
- main

pool:
  name: Media Playwright

variables:
  composeFile: docker-compose.yml
  serviceName: playwright

steps:

# Checkout
- checkout: self

#---------------------------------------------------------
# Cleanup Previous Docker Resources
#---------------------------------------------------------
- task: CmdLine@2
  displayName: 'Cleanup Previous Docker Resources'
  continueOnError: true
  inputs:
    script: |
      echo ===== Cleanup Started =====

      docker compose -f $(composeFile) down --remove-orphans

      docker system prune -f

      if exist playwright-report rmdir /S /Q playwright-report

      if exist test-results rmdir /S /Q test-results

      echo Cleanup Completed

#---------------------------------------------------------
# Build Fresh Docker Image
#---------------------------------------------------------
- task: CmdLine@2
  displayName: 'Build Docker Image'
  inputs:
    script: |
      docker compose -f $(composeFile) build --no-cache

#---------------------------------------------------------
# Start Playwright Container
#---------------------------------------------------------
- task: CmdLine@2
  displayName: 'Start Playwright Container'
  inputs:
    script: |
      docker compose -f $(composeFile) up -d

#---------------------------------------------------------
# Wait Until Playwright Finishes
#---------------------------------------------------------
- task: CmdLine@2
  displayName: 'Wait For Tests'
  inputs:
    script: |
      for /f %%i in ('docker compose -f $(composeFile) ps -q $(serviceName)') do (
          docker wait %%i
      )

#---------------------------------------------------------
# Show Logs
#---------------------------------------------------------
- task: CmdLine@2
  displayName: 'Container Logs'
  condition: always()
  inputs:
    script: |
      docker compose -f $(composeFile) logs

#---------------------------------------------------------
# Publish Playwright Report
#---------------------------------------------------------
- task: PublishPipelineArtifact@1
  displayName: 'Publish Playwright Report'
  condition: always()
  inputs:
    targetPath: 'playwright-report'
    artifact: 'PlaywrightReport'

#---------------------------------------------------------
# Publish Test Results
#---------------------------------------------------------
- task: PublishTestResults@2
  displayName: 'Publish Test Results'
  condition: always()
  inputs:
    testResultsFormat: 'JUnit'
    testResultsFiles: 'test-results/*.xml'
    failTaskOnFailedTests: false

#---------------------------------------------------------
# Final Cleanup
#---------------------------------------------------------
- task: CmdLine@2
  displayName: 'Final Cleanup'
  condition: always()
  continueOnError: true
  inputs:
    script: |
      docker compose -f $(composeFile) down --remove-orphans

      docker image prune -f

      docker container prune -f

      docker volume prune -f

      echo Cleanup Finished