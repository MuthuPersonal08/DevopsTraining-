trigger: none

pool:
  name: Remote

steps:
- checkout: self

- powershell: |
    Write-Host "========================================"
    Write-Host "Azure DevOps Self-Hosted Agent Test"
    Write-Host "========================================"

    Write-Host "Computer Name : $env:COMPUTERNAME"
    Write-Host "User Name     : $env:USERNAME"
    Write-Host "Current Date  : $(Get-Date)"
    Write-Host "Agent Name    : $env:AGENT_NAME"
    Write-Host "Agent Machine : $env:AGENT_MACHINENAME"

    Write-Host ""
    Write-Host "Current Directory"
    Get-Location

    Write-Host ""
    Write-Host "Files in C:\"
    Get-ChildItem C:\

    Write-Host ""
    Write-Host "Checking IIS Service"
    Get-Service W3SVC

    Write-Host ""
    Write-Host "Disk Information"
    Get-PSDrive

    Write-Host ""
    Write-Host "Environment Variables"
    Get-ChildItem Env:

    Write-Host ""
    Write-Host "Test Completed Successfully"
  displayName: 'Test Self-Hosted Agent'